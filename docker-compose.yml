# OpenClaw 官方 Docker Compose 配置
# 文档：https://docs.openclaw.ai

services:
  openclaw:
    # 构建配置
    build:
      context: .
      dockerfile: Dockerfile
    
    # 镜像名称
    image: openclaw:local
    
    # 不指定容器名，让 Docker Compose 自动管理
    # 容器名格式：<项目名>_openclaw_1
    # 项目名默认使用目录名（如 openclaw2、openclaw3）
    # 这样可以同时运行多个实例而不冲突
    
    # 重启策略（防止无限重启循环）
    # on-failure:3 = 最多重启 3 次，避免内存崩溃后无限重启导致服务器卡死
    # 如果容器连续崩溃 3 次，需要手动检查日志和配置
    restart: on-failure:3
    
    # 网络模式：使用 host 模式，容器直接使用主机网络
    # 优点：无需端口映射，性能更好，无 NAT 开销
    # 缺点：容器端口直接占用主机端口
    network_mode: host
    
    # 卷挂载 - 持久化数据
    volumes:
      # 映射整个 .openclaw 目录（包括 openclaw.json 配置）
      # 这样可以保证配置、凭证、身份等所有数据持久化
      - ./.openclaw:/root/.openclaw:rw
    
    # 环境变量
    environment:
      # 时区
      - TZ=Asia/Shanghai
      # Node.js 环境
      - NODE_ENV=production
      # 默认模型（可选）
      - OPENCLAW_DEFAULT_MODEL=${OPENCLAW_DEFAULT_MODEL:-anthropic/claude-opus-4-6}
      # Gateway 监听端口（host 网络模式必需）
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_PORT:-8082}
      # Node.js 堆内存限制（MB），根据服务器内存调整
      # 1.6GB 服务器单实例：512，双实例：256
      # 2GB+ 服务器：768-1024
      - NODE_OPTIONS=--max-old-space-size=${NODE_MEMORY_LIMIT:-512}
      # 代理配置（可选，用于访问 GitHub 等受限网站）
      # - http_proxy=http://username:password@proxy.example.com:8080
      # - https_proxy=http://username:password@proxy.example.com:8080
    
    # 容器资源限制
    mem_limit: ${CONTAINER_MEMORY_LIMIT:-800}m
    memswap_limit: ${CONTAINER_MEMORY_LIMIT:-800}m
    
    # 禁用 core 文件生成（防止崩溃时产生大型 core 文件占用磁盘）
    ulimits:
      core: 0
    
    # 健康检查（增强版）
    # 检测 Gateway 是否正常响应，连续失败 5 次后标记为 unhealthy
    # unhealthy 不会自动重启，需要配合 restart 策略
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s --max-time 5 http://127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}/ || exit 1"]
      interval: 30s          # 每 30 秒检查一次
      timeout: 10s           # 超时 10 秒
      retries: 5             # 连续 5 次失败才标记为 unhealthy（避免误判）
      start_period: 90s      # 启动后 90 秒内不检查（给足启动时间）
    
    # 资源限制（可选，根据服务器性能调整）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
